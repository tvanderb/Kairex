# Report schedules — all times in ET (America/New_York).
# generation_buffer_minutes: how far ahead of delivery_time to start generation.
# If generation finishes early, the report is held until delivery_time.
# If generation runs past delivery_time, the report is sent immediately.

[morning]
delivery_time = "08:30"
generation_buffer_minutes = 10
description = "Pre-market briefing"

[midday]
delivery_time = "12:00"
generation_buffer_minutes = 10
description = "Midday update"

[evening]
delivery_time = "20:00"
generation_buffer_minutes = 10
description = "Evening recap"

[weekly]
delivery_time = "17:00"
day = "sunday"
generation_buffer_minutes = 15
description = "Weekly briefing"

# No daily reports on Sunday — the weekly briefing is the Sunday content.
# Monday pre-market picks up the thread.
skip_daily_on = ["sunday"]

[overnight]
# Reduced alert sensitivity during these hours (ET).
# Only genuinely significant moves fire outside active hours.
start = "22:00"
end = "08:00"
