# LLM client configuration.
# API key is read from the env var matching the provider:
#   anthropic   → ANTHROPIC_API_KEY
#   openrouter  → OPENROUTER_API_KEY

provider = "openrouter"
model = "anthropic/claude-opus-4.6"
max_tokens = 16384
temperature = 0.3
timeout_seconds = 120

# Path to prompts directory (relative to project root).
prompts_dir = "prompts"

[retry]
max_retries = 3
base_delay_ms = 1000
max_delay_ms = 30000
